<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Resultado Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand" href="/torneos"><i class="bi bi-vinyl-fill"></i> PokeSistema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/buscador">Buscador API</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/users">Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/torneos">Torneos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/equipos">Mis Equipos</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container text-center flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card shadow-lg border-0" th:if="${pokemon}">
                    <div class="card-header bg-primary text-white text-uppercase fw-bold pt-3 pb-2">
                        <h4 th:text="${pokemon.name}"></h4>
                    </div>
                    <div class="card-body bg-white p-4">
                        <img th:src="${pokemon.image}" alt="Foto Pokemon" class="img-fluid mb-3" style="width: 150px; height: 150px; image-rendering: pixelated;">
                        <p class="fst-italic text-muted mb-4" th:text="${pokemon.description}"></p>
                        
                        <div class="d-flex justify-content-around text-start border-top pt-3 mt-3">
                            <div>
                                <strong class="text-primary"><i class="bi bi-lightning-charge"></i> Tipo:</strong> 
                                <span class="text-uppercase" th:text="${pokemon.type}"></span>
                            </div>
                            <div>
                                <strong class="text-primary"><i class="bi bi-arrows-vertical"></i> Altura:</strong> 
                                <span th:text="${pokemon.height / 10.0} + ' m'"></span>
                            </div>
                            <div>
                                <strong class="text-primary"><i class="bi bi-speedometer2"></i> Peso:</strong> 
                                <span th:text="${pokemon.weight / 10.0} + ' kg'"></span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 pb-4">
                        <a href="/buscador" class="btn btn-outline-primary rounded-pill px-4"><i class="bi bi-search"></i> Volver al Buscador</a>
                    </div>
                </div>

                <div class="alert alert-danger shadow" th:if="${error}">
                    <h4 class="alert-heading"><i class="bi bi-exclamation-triangle"></i> ¡Ups! Algo salió mal</h4>
                    <p th:text="${error}"></p>
                    <hr>
                    <a href="/buscador" class="btn btn-danger rounded-pill px-4">Intentar de nuevo</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
