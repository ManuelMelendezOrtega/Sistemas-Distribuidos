<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Resultado Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Centro Pokémon</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/entrenadores">Entrenadores</a></li>
                <li class="nav-item"><a class="nav-link" href="/pokemons">Mis Pokémon</a></li>
                
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                    <a class="nav-link" href="/usuarios">Usuarios</a>
                </li>
                
                <li class="nav-item"><a class="nav-link active text-success fw-bold" href="/buscador">Buscador API (P1)</a></li>
                <li class="nav-item ms-3">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm mt-1">Cerrar Sesión</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            
            <div class="card shadow border-success text-center" th:if="${pokemon}">
                <div class="bg-light p-4 border-bottom">
                    <img th:src="@{'https://img.pokemondb.net/artwork/large/' + ${#strings.toLowerCase(pokemon.name)} + '.jpg'}" 
                         alt="Foto del Pokémon" 
                         class="img-fluid" 
                         style="max-height: 250px;">
                </div>
                
                <div class="card-body">
                    <h2 class="card-title text-success text-capitalize fw-bold mb-3" th:text="${pokemon.name}">Nombre</h2>
                    
                    <ul class="list-group list-group-flush text-start mb-3">
                        <li class="list-group-item">
                            <strong>🔥 Tipo:</strong> <span class="float-end text-capitalize" th:text="${pokemon.type}"></span>
                        </li>
                        <li class="list-group-item">
                            <strong>📏 Altura:</strong> <span class="float-end" th:text="${pokemon.height / 10.0} + ' metros'"></span>
                        </li>
                        <li class="list-group-item">
                            <strong>⚖️ Peso:</strong> <span class="float-end" th:text="${pokemon.weight / 10.0} + ' kg'"></span>
                        </li>
                    </ul>
                    
                    <a href="/buscador" class="btn btn-success fw-bold w-100">Buscar otro Pokémon</a>
                </div>
            </div>

            <div class="card shadow border-danger text-center" th:if="${error}">
                <div class="card-body p-5">
                    <h1 style="font-size: 50px;">⚠️</h1>
                    <h4 class="text-danger fw-bold mt-3">¡Oh no! Algo ha fallado</h4>
                    <p class="text-muted mt-2" th:text="${error}"></p>
                    <a href="/buscador" class="btn btn-outline-danger mt-3">Intentarlo de nuevo</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
