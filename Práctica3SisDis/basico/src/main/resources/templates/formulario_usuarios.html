<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h3 class="mb-0">Registrar Usuario</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/usuarios}" th:object="${usuario}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de Usuario:</label>
                            <input type="text" class="form-control" th:field="*{username}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Contraseña:</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Rol del Sistema:</label>
                            <select class="form-select" th:field="*{userRole.id}" required>
                                <option value="" disabled selected>Selecciona un rol...</option>
                                <option th:each="rol : ${roles}" 
                                    th:value="${rol.id}" 
                                    th:text="${rol.roleName}">Nombre Rol</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark fw-bold">Guardar Usuario</button>
                            <a th:href="@{/usuarios}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
