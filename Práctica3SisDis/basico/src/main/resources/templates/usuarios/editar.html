<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PokeSistema - Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white pt-3 pb-2">
                        <h4>Editar Usuario</h4>
                    </div>
                    <div class="card-body p-4 text-start">
                        
                        <form th:action="@{/users/guardar}" th:object="${usuario}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Nombre de Usuario</label>
                                <input type="text" class="form-control" th:field="*{username}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Correo Electrónico (Email)</label>
                                <input type="email" class="form-control" th:field="*{email}">
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted">Rol del Sistema</label>
                                <select class="form-select" th:field="*{userRole.id}">
                                    <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.roleName}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a href="/users" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success px-4">Guardar Cambios</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
