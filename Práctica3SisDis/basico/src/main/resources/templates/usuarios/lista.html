<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>PokeSistema - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand" href="/torneos"><i class="bi bi-vinyl-fill"></i> PokeSistema</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/buscador">Buscador API</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link active" href="/users">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/torneos">Torneos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/equipos">Mis Equipos</a></li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white pt-4 px-4 pb-3">
                <h3 class="mb-0"><i class="bi bi-people-fill text-warning"></i> Control de Entrenadores (Usuarios)</h3>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0 align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${usuarios}">
                            <td class="text-muted fw-bold" th:text="${user.id}"></td>
                            
                            <td class="text-primary fs-5 fw-bold" th:text="${user.username}"></td>
                            
                            <td th:text="${user.email}"></td>
                            
                            <td>
                                <span class="badge px-3 py-2" 
                                      th:if="${user.userRole != null}"
                                      th:classappend="${user.userRole.roleName == 'ROLE_ADMIN' ? 'bg-danger' : 'bg-info'}" 
                                      th:text="${user.userRole.roleName}">
                                </span>
                                <span class="badge px-3 py-2 bg-secondary" th:if="${user.userRole == null}">SIN ROL</span>
                            </td>
                            
                            <td>
                                <a th:href="@{/users/editar/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i> Editar</a>
                                <a th:if="${user.username != 'admin'}" th:href="@{/users/eliminar/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro que quieres borrar a este usuario?');"><i class="bi bi-trash"></i> Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
