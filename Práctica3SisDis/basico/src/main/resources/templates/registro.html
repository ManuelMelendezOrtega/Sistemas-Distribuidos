<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PokeSistema - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-lg mt-5">
                    <div class="card-header bg-primary text-white pt-3 pb-2">
                        <h3 class="mb-0">Crear Nueva Cuenta</h3>
                    </div>
                    <div class="card-body p-4 text-start">
                        
                        <div th:if="${errorUsuario}" class="alert alert-danger shadow-sm border-0 mb-4 text-center">
                            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorUsuario}"></span>
                        </div>
                        
                        <form th:action="@{/registro}" th:object="${usuario}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-muted">Nombre de Usuario (Username)</label>
                                <input type="text" class="form-control" th:field="*{username}" required autofocus>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Correo Electrónico</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted">Contraseña</label>
                                <input type="password" class="form-control" th:field="*{password}" required>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-success btn-lg">Registrarme</button>
                            </div>
                        </form>

                    </div>
                    <div class="card-footer text-center py-3 bg-white border-0">
                        <div class="small"><a href="/login" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a></div>
                        <div class="small mt-2"><a href="/" class="text-decoration-none text-muted">Volver al inicio</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
