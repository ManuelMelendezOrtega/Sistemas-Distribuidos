<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mis Equipos - PokeSistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .poke-img { transition: transform 0.2s; }
        .poke-img:hover { transform: scale(1.2); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/torneos"><i class="bi bi-vinyl-fill"></i> PokeSistema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/buscador">Buscador API</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" href="/users">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/torneos">Torneos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/equipos">Mis Equipos</a></li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex"><button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button></form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary"><i class="bi bi-box-seam-fill"></i> Mis Equipos Estratégicos</h2>
            <a href="/equipos/nuevo" class="btn btn-success"><i class="bi bi-plus-lg"></i> Crear Equipo</a>
        </div>

        <div class="row g-4" th:if="${equipos != null and not #lists.isEmpty(equipos)}">
            <div class="col-md-4" th:each="equipo : ${equipos}">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-dark text-white d-flex justify-content-between">
                        <h5 class="mb-0" th:text="${equipo.nombreEquipo}"></h5>
                    </div>
                    <div class="card-body bg-white p-2">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item px-2 py-1 border-0" th:each="poke : ${ {equipo.p1, equipo.p2, equipo.p3, equipo.p4, equipo.p5, equipo.p6} }">
                                <a th:href="@{/pokemon/buscar(nombre=${poke.toLowerCase().trim()})}" class="text-decoration-none text-dark fw-bold d-flex align-items-center">
                                    <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${poke.toLowerCase().trim()} + '.png'}" 
                                         height="45" class="poke-img me-3" 
                                         onerror="this.style.display='none'">
                                    <span th:text="${poke}" class="text-capitalize"></span>
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-footer bg-light border-0 text-center pb-3">
                        <a th:href="@{/equipos/editar/{id}(id=${equipo.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i> Editar</a>
                        <a th:href="@{/equipos/eliminar/{id}(id=${equipo.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Borrar este equipo?');"><i class="bi bi-trash"></i> Eliminar</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${equipos == null or #lists.isEmpty(equipos)}" class="alert alert-info text-center mt-3 shadow-sm border-0">
            Aún no tienes equipos. ¡Haz clic en "Crear Equipo" para empezar a construir tu estrategia!
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
