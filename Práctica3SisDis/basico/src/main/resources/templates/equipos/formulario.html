<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editor de Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center py-5">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0">Configurar Equipo</h4>
                    </div>
                    <div class="card-body p-4 text-start">
                        
                        <div th:if="${errorPokemon}" class="alert alert-danger shadow-sm border-0 mb-4">
                            <i class="bi bi-exclamation-circle-fill"></i> <span th:text="${errorPokemon}"></span>
                        </div>
                        
                        <form th:action="@{/equipos/guardar}" th:object="${equipo}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-4">
                                <label class="form-label text-muted fw-bold">Nombre del Equipo (ej: Tipo tierra)</label>
                                <input type="text" class="form-control form-control-lg" th:field="*{nombreEquipo}" required autofocus>
                            </div>
                            
                            <p class="text-muted border-bottom pb-2">Integrantes del equipo</p>
                            <div class="row g-3 mb-4">
                                <div class="col-6"><input type="text" class="form-control" th:field="*{p1}" placeholder="Pokémon 1" required></div>
                                <div class="col-6"><input type="text" class="form-control" th:field="*{p2}" placeholder="Pokémon 2" required></div>
                                <div class="col-6"><input type="text" class="form-control" th:field="*{p3}" placeholder="Pokémon 3" required></div>
                                <div class="col-6"><input type="text" class="form-control" th:field="*{p4}" placeholder="Pokémon 4" required></div>
                                <div class="col-6"><input type="text" class="form-control" th:field="*{p5}" placeholder="Pokémon 5" required></div>
                                <div class="col-6"><input type="text" class="form-control" th:field="*{p6}" placeholder="Pokémon 6" required></div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a href="/equipos" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success px-5">Guardar Equipo</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
