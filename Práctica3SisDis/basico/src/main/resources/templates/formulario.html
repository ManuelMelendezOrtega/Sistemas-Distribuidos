<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Entrenador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Registrar Nuevo Entrenador</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/entrenadores}" th:object="${entrenador}" method="post">
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Entrenador:</label>
                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required placeholder="Ej: Ash, Misty, Brock...">
                        </div>
                        
                        <div class="mb-3">
                            <label for="region" class="form-label fw-bold">Región de Origen:</label>
                            <select class="form-select" id="region" th:field="*{region}">
                                <option value="Kanto">Kanto</option>
                                <option value="Johto">Johto</option>
                                <option value="Hoenn">Hoenn</option>
                                <option value="Sinnoh">Sinnoh</option>
                                <option value="Paldea">Paldea</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="edad" class="form-label fw-bold">Edad:</label>
                            <input type="number" class="form-control" id="edad" th:field="*{edad}" min="10" max="99" required value="10">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Guardar Entrenador</button>
                            <a th:href="@{/entrenadores}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
