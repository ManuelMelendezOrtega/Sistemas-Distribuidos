<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark fw-bold">
                    <h3 class="mb-0">Registrar Nueva Captura</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/pokemons}" th:object="${pokemon}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Especie del Pokémon (Ej: Charizard):</label>
                            <input type="text" class="form-control" th:field="*{especie}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nivel:</label>
                            <input type="number" class="form-control" th:field="*{nivel}" min="1" max="100" required value="1">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">¿Qué Entrenador lo capturó?</label>
                            <select class="form-select" th:field="*{entrenador.id}" required>
                                <option value="" disabled selected>Selecciona un entrenador...</option>
                                <option th:each="ent : ${entrenadores}" th:value="${ent.id}" th:text="${ent.nombre}">Nombre Entrenador</option>
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark fw-bold">Guardar en la PC</button>
                            <a th:href="@{/pokemons}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
