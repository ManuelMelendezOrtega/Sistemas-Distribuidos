<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cajas Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Centro Pokémon</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/entrenadores">Entrenadores</a></li>
                <li class="nav-item"><a class="nav-link active" href="/pokemons">Mis Pokémon</a></li>
                
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                    <a class="nav-link" href="/usuarios">Usuarios</a>
                </li>
                
                <li class="nav-item"><a class="nav-link text-warning fw-bold" href="/buscador">Buscador API (P1)</a></li>
                <li class="nav-item ms-3">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm mt-1">Cerrar Sesión</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning d-flex justify-content-between align-items-center">
            <h3 class="mb-0 text-dark fw-bold">Cajas Pokémon (Pokémon Atrapados)</h3>
            <a th:href="@{/pokemons/nuevo}" class="btn btn-dark btn-sm fw-bold">+ Registrar Captura</a>
        </div>
        <div class="card-body">
            <table class="table table-hover table-bordered mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Especie</th>
                        <th>Nivel</th>
                        <th>Pertenece al Entrenador</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${pokemons}">
                        <td th:text="${p.id}">1</td>
                        <td class="fw-bold text-primary" th:text="${p.especie}">Pikachu</td>
                        <td th:text="${p.nivel}">25</td>
                        <td th:text="${p.entrenador != null ? p.entrenador.nombre : 'Sin entrenador'}">Ash</td>
                        <td>
                            <a th:href="@{/pokemons/{id}/eliminar(id=${p.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Liberar a este Pokémon?');">Liberar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pokemons)}">
                        <td colspan="5" class="text-center text-muted py-3">Aún no se ha registrado ninguna captura.</td>
                    </tr>
                </tbody>
            </table>
            <a th:href="@{/}" class="btn btn-secondary mt-3">Volver al Inicio</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
