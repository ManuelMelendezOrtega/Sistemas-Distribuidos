<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Participantes del Torneo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .poke-link { transition: transform 0.2s; display: inline-block; }
        .poke-link:hover { transform: scale(1.15); }
        .poke-sprite { width: 50px; height: 50px; object-fit: contain; image-rendering: pixelated; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white pt-4 px-4 pb-3">
                <h3 class="mb-0"><i class="bi bi-shield-shaded text-warning"></i> Entrenadores Inscritos: <span th:text="${torneo.nombre}"></span></h3>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Entrenador</th>
                                <th colspan="6">Equipo Registrado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ins : ${inscripciones}">
                                <td><strong class="text-primary fs-5" th:text="${ins.usuario.username}"></strong></td>
                                
                                <td>
                                    <a th:href="@{/pokemon/buscar(nombre=${ins.pokemon1})}" class="text-decoration-none poke-link">
                                        <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${#strings.toLowerCase(ins.pokemon1)} + '.png'}" class="poke-sprite d-block mx-auto mb-1" alt="Sprite">
                                        <span class="badge bg-secondary w-100 text-uppercase" th:text="${ins.pokemon1}"></span>
                                    </a>
                                </td>
                                <td>
                                    <a th:href="@{/pokemon/buscar(nombre=${ins.pokemon2})}" class="text-decoration-none poke-link">
                                        <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${#strings.toLowerCase(ins.pokemon2)} + '.png'}" class="poke-sprite d-block mx-auto mb-1" alt="Sprite">
                                        <span class="badge bg-secondary w-100 text-uppercase" th:text="${ins.pokemon2}"></span>
                                    </a>
                                </td>
                                <td>
                                    <a th:href="@{/pokemon/buscar(nombre=${ins.pokemon3})}" class="text-decoration-none poke-link">
                                        <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${#strings.toLowerCase(ins.pokemon3)} + '.png'}" class="poke-sprite d-block mx-auto mb-1" alt="Sprite">
                                        <span class="badge bg-secondary w-100 text-uppercase" th:text="${ins.pokemon3}"></span>
                                    </a>
                                </td>
                                <td>
                                    <a th:href="@{/pokemon/buscar(nombre=${ins.pokemon4})}" class="text-decoration-none poke-link">
                                        <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${#strings.toLowerCase(ins.pokemon4)} + '.png'}" class="poke-sprite d-block mx-auto mb-1" alt="Sprite">
                                        <span class="badge bg-secondary w-100 text-uppercase" th:text="${ins.pokemon4}"></span>
                                    </a>
                                </td>
                                <td>
                                    <a th:href="@{/pokemon/buscar(nombre=${ins.pokemon5})}" class="text-decoration-none poke-link">
                                        <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${#strings.toLowerCase(ins.pokemon5)} + '.png'}" class="poke-sprite d-block mx-auto mb-1" alt="Sprite">
                                        <span class="badge bg-secondary w-100 text-uppercase" th:text="${ins.pokemon5}"></span>
                                    </a>
                                </td>
                                <td>
                                    <a th:href="@{/pokemon/buscar(nombre=${ins.pokemon6})}" class="text-decoration-none poke-link">
                                        <img th:src="@{'https://play.pokemonshowdown.com/sprites/dex/' + ${#strings.toLowerCase(ins.pokemon6)} + '.png'}" class="poke-sprite d-block mx-auto mb-1" alt="Sprite">
                                        <span class="badge bg-secondary w-100 text-uppercase" th:text="${ins.pokemon6}"></span>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(inscripciones)}">
                                <td colspan="7" class="py-5 text-muted">Aún no hay ningún entrenador apuntado a este torneo.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white py-3 border-0">
                <a href="/torneos" class="btn btn-outline-primary"><i class="bi bi-arrow-left"></i> Volver a Torneos</a>
            </div>
        </div>
    </div>
</body>
</html>
