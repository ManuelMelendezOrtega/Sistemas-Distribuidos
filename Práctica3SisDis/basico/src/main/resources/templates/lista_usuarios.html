<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Mantenimiento de Usuarios</h3>
            <a th:href="@{/usuarios/nuevo}" class="btn btn-light btn-sm fw-bold">+ Nuevo Usuario</a>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger fw-bold text-center shadow-sm" role="alert" th:text="${error}"></div>
            <div th:if="${exito}" class="alert alert-success fw-bold text-center shadow-sm" role="alert" th:text="${exito}"></div>
            <table class="table table-hover table-bordered mt-3">
                <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Nombre de Usuario</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${usuarios}">
                        <td th:text="${user.id}">1</td>
                        <td class="fw-bold" th:text="${user.username}">Admin</td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${user.userRole.roleName}">ADMIN</span>
                        </td>
                        <td>
                            <a th:href="@{/usuarios/{id}/eliminar(id=${user.id})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar a este usuario del sistema?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="4" class="text-center py-3">No hay usuarios registrados.</td>
                    </tr>
                </tbody>
            </table>
            <a th:href="@{/}" class="btn btn-secondary mt-3">Volver al Inicio</a>
        </div>
    </div>
</div>

</body>
</html>
