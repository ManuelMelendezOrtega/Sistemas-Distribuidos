<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Buscador API Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Centro Pokémon</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/entrenadores">Entrenadores</a></li>
                <li class="nav-item"><a class="nav-link" href="/pokemons">Mis Pokémon</a></li>
                
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                    <a class="nav-link" href="/usuarios">Usuarios</a>
                </li>
                
                <li class="nav-item"><a class="nav-link active text-success fw-bold" href="/buscador">Buscador API (P1)</a></li>
                <li class="nav-item ms-3">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm mt-1">Cerrar Sesión</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-success">
                <div class="card-header bg-success text-white fw-bold">
                    <h3 class="mb-0 text-center">Buscador de la API (Práctica 1)</h3>
                </div>
                <div class="card-body text-center p-5">
                    <p class="lead mb-4">Introduce el nombre de un Pokémon para consultar nuestra API en Python en tiempo real.</p>
                    
                    <form th:action="@{/pokemon/buscar}" method="get">
                        <div class="input-group input-group-lg mb-3 shadow-sm">
                            <input type="text" name="nombre" class="form-control" placeholder="Ej: pikachu, charizard..." required>
                            <button type="submit" class="btn btn-success fw-bold">Buscar Pokémon</button>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
