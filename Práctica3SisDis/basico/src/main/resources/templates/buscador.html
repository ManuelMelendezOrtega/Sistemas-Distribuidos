<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>PokeSistema - Buscador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/torneos"><i class="bi bi-vinyl-fill"></i> PokeSistema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/buscador">Buscador API</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/users">Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/torneos">Torneos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/equipos">Mis Equipos</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-white pb-0 border-0 pt-4 px-4">
                        <h3 class="text-secondary"><i class="bi bi-search"></i> Pokédex de Torneos</h3>
                        <p class="text-muted">¿No conoces a algún Pokémon usado por tus rivales en los torneos? Busca aquí su información, foto y descripción directamente desde la PokeAPI.</p>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/pokemon/buscar}" method="get" class="d-flex gap-2">
                            <input type="text" class="form-control form-control-lg" name="nombre" placeholder="Ej: pikachu, charizard..." required>
                            <button type="submit" class="btn btn-primary btn-lg px-4">Buscar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
