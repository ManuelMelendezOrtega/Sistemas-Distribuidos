<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>PokeSistema - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/buscador"><i class="bi bi-vinyl-fill"></i> PokeSistema</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/buscador">Buscador API</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/users">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/torneos">Torneos</a></li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
                <h3 class="text-secondary mb-0"><i class="bi bi-people-fill"></i> Mantenimiento de Usuarios</h3>
                <span class="badge bg-primary rounded-pill p-2">Panel de Administración</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Username</th>
                                <th>Nombre Completo</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th class="text-end pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${usuarios}">
                                <td class="ps-4 th-sm" th:text="${u.id}">1</td>
                                <td><strong th:text="${u.username}">admin</strong></td>
                                <td th:text="${u.nombreUsuario}">Administrador</td>
                                <td th:text="${u.email}">admin@correo.com</td>
                                <td>
                                    <span th:class="${u.userRole.roleName == 'ROLE_ADMIN' ? 'badge bg-danger' : 'badge bg-info'}"
                                          th:text="${u.userRole.roleName}">ROLE_ADMIN</span>
                                </td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/users/editar/{id}(id=${u.id})}" class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i> Editar
                                    </a>
                                    <a th:if="${u.username != 'admin'}" th:href="@{/users/eliminar/{id}(id=${u.id})}" 
                                       class="btn btn-sm btn-outline-danger" 
                                       onclick="return confirm('¿Seguro que deseas eliminar este usuario?');">
                                        <i class="bi bi-trash"></i> Borrar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bundle.min.js"></script>
</body>
</html>
