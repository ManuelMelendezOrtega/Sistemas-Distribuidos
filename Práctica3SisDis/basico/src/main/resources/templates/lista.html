<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Entrenadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Gestión de Entrenadores Pokémon</h3>
            <a th:href="@{/entrenadores/nuevo}" class="btn btn-light btn-sm text-primary fw-bold">+ Nuevo Entrenador</a>
        </div>
        <div class="card-body">
            <table class="table table-hover table-bordered mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Región</th>
                        <th>Edad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entrenador : ${entrenadores}">
                        <td th:text="${entrenador.id}">1</td>
                        <td class="fw-bold" th:text="${entrenador.nombre}">Ash Ketchum</td>
                        <td th:text="${entrenador.region}">Kanto</td>
                        <td th:text="${entrenador.edad}">10</td>
                        <td>
                            <a th:href="@{/entrenadores/{id}/eliminar(id=${entrenador.id})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Estás seguro de que deseas eliminar este entrenador?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(entrenadores)}">
                        <td colspan="5" class="text-center text-muted py-3">No hay entrenadores registrados. ¡Crea uno nuevo!</td>
                    </tr>
                </tbody>
            </table>
            
            <a th:href="@{/}" class="btn btn-secondary mt-3">Volver al Inicio</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
